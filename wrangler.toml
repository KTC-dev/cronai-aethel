name = "cronai-aethel"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
FAL_KEY = ""
OPENAI_API_KEY = ""
INTERNAL_KEY = ""
CLOUDFLARE_ACCOUNT_ID = ""
CLOUDFLARE_API_TOKEN = ""

[[ai]]
binding = "AI"

[[r2_buckets]]
binding = "CRONAI_ASSETS"
bucket_name = "cronai-assets"

[[r2_buckets]]
binding = "CRONAI_VIDEOS"
bucket_name = "cronai-videos"

[[queues]]
binding = "AI_QUEUE"
queue_name = "ai-job-queue"

[[kv_namespaces]]
binding = "KV"
id = ""

[[d1_databases]]
binding = "DB"
database_name = "cronai_aethel_db"
database_id = ""

[[services]]
binding = "FFMPEG_SANDBOX"
service = "ffmpeg-sandbox"
environment = "production"

# Optional: For scheduling tasks
# [[triggers]]
# crons = ["0 * * * *"]